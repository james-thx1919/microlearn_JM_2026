<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#080A0F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>MicroLearn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        height: 100%;
      }
      body {
        background: #080a0f;
        color: #eef0f5;
        font-family: "DM Sans", sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      #root {
        min-height: 100vh;
        max-width: 430px;
        margin: 0 auto;
        position: relative;
        overflow-x: hidden;
      }
      ::-webkit-scrollbar {
        display: none;
      }
      * {
        scrollbar-width: none;
      }
      button {
        font-family: inherit;
      }
      input {
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
